name: CI workflow

on:
  push:
    branches:
      - '**'
jobs:
    build:   #job name and will run on ubuntu:latest
        runs-on: ubuntu-latest #github free runners
        steps:
            - name: Checkout code 
              uses: actions/checkout@v4  #clone the code into runner | v4 is most popular one

            - name: Setup docker
              uses: docker/setup-buildx-action@v4

            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Dcoker Build and Push
              uses: docker/build-push-action@v7
              with:
                  push: true
                  tags: sanket9552/app:latest
